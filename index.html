<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Media - Жанрлар бўйича саралаш</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #16161e;
            --gold: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --gold-solid: #f6d365;
            --text: #f1f5f9;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        header { 
            background: var(--card); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(246, 211, 101, 0.2); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        
        .logo-container { display: flex; align-items: center; text-decoration: none; gap: 10px; cursor: pointer; }
        .logo-icon { width: 35px; height: 35px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #16161e; font-weight: bold; font-size: 22px; box-shadow: 0 0 10px rgba(246, 211, 101, 0.4); }
        .logo-text { font-size: 20px; font-weight: bold; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; text-transform: uppercase; }

        nav { margin: 0 20px; }
        .navbar { list-style: none; padding: 0; margin: 0; display: flex; gap: 15px; }
        .navbar li { position: relative; }
        .navbar li a { color: var(--text); text-decoration: none; font-weight: 500; padding: 10px 5px; transition: 0.3s; display: block; cursor: pointer; }
        .navbar li a:hover { color: var(--gold-solid); }

        .dropdown-content {
            display: none;
            position: absolute;
            background: var(--card);
            min-width: 180px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1100;
            border: 1px solid rgba(246, 211, 101, 0.2);
            border-radius: 8px;
            top: 100%;
            left: 0;
            padding: 10px 0;
        }
        .dropdown-content li a { padding: 10px 20px; font-size: 14px; }
        .dropdown-content li a:hover { background: var(--gold); color: #000; }
        .dropdown:hover .dropdown-content { display: block; }

        /* Жанр сарлавҳаси */
        .genre-title { padding: 20px 5%; font-size: 1.5rem; color: var(--gold-solid); text-transform: uppercase; border-left: 4px solid var(--gold-solid); margin-bottom: 10px; }

        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-block; text-decoration: none; font-size: 14px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-danger { background: #ef4444; color: white; }

        .container { padding: 20px 5%; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .movie-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; position: relative; }
        .movie-card:hover { border-color: var(--gold-solid); transform: translateY(-5px); }

        .video-container { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .movie-info { padding: 15px; text-align: center; }
        .movie-info h3 { color: var(--gold-solid); margin: 0 0 5px 0; font-size: 1.1rem; }
        .movie-info p { color: #64748b; font-size: 13px; margin: 5px 0; }
        
        .stats { display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.3); font-size: 13px; color: #94a3b8; border-top: 1px solid rgba(255,255,255,0.05); }
        .stats-item { display: flex; align-items: center; gap: 5px; }
        .stars { color: #fbbf24; font-size: 18px; margin: 8px 0; }

        .admin-panel { display: none; max-width: 600px; margin: 20px auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--gold-solid); }
        .input-group { margin-bottom: 12px; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; background: #000; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--gold-solid); width: 300px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo-container" onclick="filterGenre('Hammasi')">
        <div class="logo-icon">U</div>
        <div class="logo-text">UNIVERSAL MEDIA</div>
    </div>
    <nav>
        <ul class="navbar">
            <li><a onclick="filterGenre('Hammasi')">Бош саҳифа</a></li>
            <li class="dropdown">
                <a>Фильмлар ▾</a>
                <ul class="dropdown-content">
                    <li><a onclick="filterGenre('Боевик')">Боевик</a></li>
                    <li><a onclick="filterGenre('Детектив')">Детектив</a></li>
                    <li><a onclick="filterGenre('Комедия')">Комедия</a></li>
                    <li><a onclick="filterGenre('Триллер')">Триллер</a></li>
                    <li><a onclick="filterGenre('Фантастика')">Фантастика</a></li>
                    <li><a onclick="filterGenre('Қўрқинчли')">Қўрқинчли</a></li>
                    <li><a onclick="filterGenre('Мелодрама')">Мелодрама</a></li>
                    <li><a onclick="filterGenre('Мультфильм')">Мультфильм</a></li>
                </ul>
            </li>
            <li><a href="#">Биз ҳақимизда</a></li>
        </ul>
    </nav>
    <div id="navBtns">
        <button class="btn btn-gold" onclick="openLogin()">Админ</button>
    </div>
</header>

<div class="container">
    <div class="genre-title" id="currentGenre">Барча фильмлар</div>
    <div class="movie-grid" id="movieGrid"></div>
</div>

<div id="adminPanel" class="admin-panel">
    <h3 style="color: var(--gold-solid); text-align: center; margin-top:0;" id="formTitle">Янги фильм</h3>
    <input type="hidden" id="editKey">
    <div class="input-group"><input type="text" id="mName" placeholder="Фильм номи"></div>
    <div class="input-group"><textarea id="mEmbed" rows="3" placeholder="Embed код"></textarea></div>
    <div class="input-group">
        <select id="mGenre">
            <option value="Боевик">Боевик</option>
            <option value="Детектив">Детектив</option>
            <option value="Комедия">Комедия</option>
            <option value="Триллер">Триллер</option>
            <option value="Фантастика">Фантастика</option>
            <option value="Қўрқинчли">Қўрқинчли</option>
            <option value="Мелодрама">Мелодрама</option>
            <option value="Мультфильм">Мультфильм</option>
        </select>
    </div>
    <button class="btn btn-gold" style="width: 100%;" onclick="saveToFirebase()">Сақлаш</button>
    <button class="btn" style="width: 100%; color: #94a3b8;" onclick="closeAdmin()">Ёпиш</button>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3 style="color: var(--gold-solid);">Админ Кириш</h3>
        <input type="password" id="passInput" style="width:100%; padding:12px; margin:15px 0; background:#000; color:white; border:1px solid var(--gold-solid); border-radius:8px; text-align:center;" placeholder="Парол">
        <button class="btn btn-gold" style="width:100%;" onclick="checkAuth()">Кириш</button>
        <button class="btn" style="color: #94a3b8; margin-top:10px;" onclick="closeLogin()">Ёпиш</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAV9u_Go4bIuDlC-vM3rH1T9MwLGwe9H3I",
        authDomain: "universal-media-8f205.firebaseapp.com",
        databaseURL: "https://universal-media-8f205-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-media-8f205",
        storageBucket: "universal-media-8f205.firebasestorage.app",
        messagingSenderId: "21945142340",
        appId: "1:21945142340:web:796e1d4e85566899b3c011"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let isAdmin = false;
    let allMovies = {};
    let selectedGenre = 'Hammasi'; // Бошида ҳаммасини кўрсатади

    database.ref('movies').on('value', (snapshot) => {
        allMovies = snapshot.val() || {};
        render();
    });

    // САРАЛАШ ФУНКЦИЯСИ
    function filterGenre(genre) {
        selectedGenre = genre;
        document.getElementById('currentGenre').innerText = genre === 'Hammasi' ? 'Барча фильмлар' : genre;
        render();
    }

    function render() {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';
        
        Object.keys(allMovies).reverse().forEach(key => {
            const m = allMovies[key];
            
            // ФИЛЬТР ЛОГИКАСИ: Агар жанр мос келса ёки 'Hammasi' бўлса кўрсатади
            if (selectedGenre === 'Hammasi' || m.genre === selectedGenre) {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="video-container">${m.embed}</div>
                    <div class="movie-info">
                        <h3>${m.name}</h3>
                        <div class="stars">★★★★★</div>
                        <p>#${m.genre}</p>
                    </div>
                    <div class="stats">
                        <div class="stats-item">👁 ${m.views || 0}</div>
                        <div class="stats-item">❤️ ${m.likes || 0}</div>
                        <div class="stats-item">⭐ ${(m.rating || 0).toFixed(1)}</div>
                    </div>
                    ${isAdmin ? `
                        <div style="padding:10px; display:flex; gap:5px; justify-content:center;">
                            <button class="btn btn-gold" style="padding:5px 10px;" onclick="prepareEdit('${key}')">✏️</button>
                            <button class="btn btn-danger" style="padding:5px 10px;" onclick="deleteMovie('${key}')">🗑</button>
                        </div>
                    ` : ''}
                `;
                grid.appendChild(card);
            }
        });
    }

    // Бошқа функциялар (saveToFirebase, prepareEdit ва ҳ.к.) аввалгидек қолади
    function saveToFirebase() {
        const name = document.getElementById('mName').value;
        const embed = document.getElementById('mEmbed').value;
        const genre = document.getElementById('mGenre').value;
        const key = document.getElementById('editKey').value;
        if(name && embed) {
            const data = { name, embed, genre };
            if(key) {
                database.ref('movies/' + key).update(data);
            } else {
                database.ref('movies').push({...data, views:0, likes:0, rating:0, ratingSum:0, ratingCount:0});
            }
            resetForm();
        }
    }

    function prepareEdit(key) {
        const m = allMovies[key];
        document.getElementById('mName').value = m.name;
        document.getElementById('mEmbed').value = m.embed;
        document.getElementById('mGenre').value = m.genre;
        document.getElementById('editKey').value = key;
        document.getElementById('formTitle').innerText = "Таҳрирлаш";
        document.getElementById('adminPanel').style.display = 'block';
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('mName').value = "";
        document.getElementById('mEmbed').value = "";
        document.getElementById('editKey').value = "";
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('formTitle').innerText = "Янги фильм";
    }

    function deleteMovie(key) { if(confirm("Ўчирилсинми?")) database.ref('movies/' + key).remove(); }
    function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

    function checkAuth() {
        if(document.getElementById('passInput').value === "1975") {
            isAdmin = true;
            closeLogin();
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('navBtns').innerHTML = '<button class="btn btn-danger" onclick="location.reload()">Чиқиш</button>';
            render();
        } else { alert("Хато!"); }
    }
</script>
</body>
</html>
