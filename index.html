<!DOCTYPE html>
<html lang="uz">
     
</html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Universal Media | Янгиликлар</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --gold: #f6d365; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { background: var(--card); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .logo { font-size: 24px; font-weight: bold; color: var(--gold); text-decoration: none; }
        .nav-link { background: var(--gold); color: #000; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .news-card { background: var(--card); border-radius: 12px; padding: 25px; margin-bottom: 20px; border-left: 5px solid var(--gold); }
        .footer-hidden { text-align: center; padding: 50px; opacity: 0.1; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .admin-card { background: #16161e; border: 2px solid var(--gold); border-radius: 20px; padding: 40px; width: 280px; text-align: center; }
        .card-input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: var(--gold); font-size: 20px; text-align: center; border-radius: 8px; outline: none; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">UNIVERSAL MEDIA</a>
    <button onclick="location.href='movies.html'" class="nav-link">КИНОЛАРГА ЎТИШ →</button>
</header>

<div class="container">
    <h1 style="text-align: center; color: var(--gold);">Сўнгги янгиликлар</h1>
    <div id="newsList"></div>
</div>

<div class="footer-hidden" onclick="showLogin()">Админ бошқаруви</div>

<div id="loginModal" class="modal">
    <div class="admin-card">
        <h3 style="color:var(--gold); margin-top:0;">АДМИН КИРИШ</h3>
        <input type="password" id="passInput" class="card-input" placeholder="****" maxlength="4">
        <button onclick="doLogin()" style="width:100%; padding:12px; background:var(--gold); border:none; cursor:pointer; font-weight:bold; border-radius:8px;">КИРИШ</button>
        <p onclick="closeLogin()" style="color:#64748b; margin-top:15px; cursor:pointer; font-size:14px;">Ёпиш</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAV9u_Go4bIuDlC-vM3rH1T9MwLGwe9H3I",
        authDomain: "universal---media.firebaseapp.com",
        databaseURL: "https://universal---media-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal---media",
        storageBucket: "universal---media.appspot.com",
        messagingSenderId: "21945142340",
        appId: "1:21945142340:web:796e1d4e85566899b3c011"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('news').on('value', (snap) => {
        const news = snap.val() || {};
        const list = document.getElementById('newsList');
        list.innerHTML = '';
        Object.keys(news).reverse().forEach(key => {
            const item = news[key];
            list.innerHTML += `<div class="news-card"><h2 style="color:var(--gold); margin-top:0;">${item.title}</h2><p>${item.text}</p></div>`;
        });
    });

    function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }
    function doLogin() {
        if(document.getElementById('passInput').value === "1975") {
            localStorage.setItem('isMovieAdmin', 'true');
            window.location.href = "movies.html";
        } else { alert("Хато!"); }
    }
    
</script>

   Verification: 9f457f646c4d6cad
</body>
</html>
