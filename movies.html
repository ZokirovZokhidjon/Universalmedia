<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Media | Янги Портал</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #16161e;
            --gold: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --gold-solid: #f6d365;
            --text: #f1f5f9;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        header { background: var(--card); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(246, 211, 101, 0.2); position: sticky; top: 0; z-index: 100; }
        
        .logo-container { display: flex; align-items: center; text-decoration: none; gap: 10px; }
        .logo-icon { width: 35px; height: 35px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #16161e; font-weight: bold; font-size: 22px; box-shadow: 0 0 10px rgba(246, 211, 101, 0.4); }
        .logo-text { font-size: 24px; font-weight: bold; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; text-transform: uppercase; }

        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-block; text-decoration: none; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--gold-solid); color: var(--gold-solid); }
        .btn-danger { background: #ef4444; color: white; }

        .admin-panel { display: none; max-width: 700px; margin: 20px auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(246, 211, 101, 0.3); }
        .input-group { margin-bottom: 15px; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; background: #000; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }

        .container { padding: 20px 5%; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .movie-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; position: relative; }
        .movie-card:hover { border-color: var(--gold-solid); transform: translateY(-5px); }

        .video-container { background: #000; position: relative; padding-top: 56.25%; width: 100%; }
        .video-container iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:none; }
        
        .movie-info { padding: 15px; text-align: center; }
        .movie-info h3 { color: var(--gold-solid); margin: 0 0 10px 0; font-size: 1.1rem; }
        
        .stats { display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.3); font-size: 13px; color: #94a3b8; border-top: 1px solid rgba(255,255,255,0.05); }
        .stats-item { cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .stats-item:hover { color: var(--gold-solid); }

        .stars { color: #4b5563; font-size: 18px; margin: 10px 0; }
        .stars .active { color: #fbbf24; }
        .star-btn { cursor: pointer; transition: 0.2s; }

        .admin-btns { display: flex; gap: 10px; justify-content: center; margin-top: 10px; padding: 10px; border-top: 1px dashed #333; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 40px; border-radius: 25px; border: 2px solid var(--gold-solid); width: 300px; text-align: center; box-shadow: 0 0 40px var(--gold-solid); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-container">
        <div class="logo-icon">U</div>
        <div class="logo-text">UNIVERSAL MEDIA</div>
    </a>
    <div id="navBtns">
        <button class="btn btn-gold" onclick="openLogin()">Шахсий кабинет</button>
    </div>
</header>

<div id="adminPanel" class="admin-panel">
    <h2 style="color: var(--gold-solid); text-align: center;" id="formTitle">Фильм қўшиш</h2>
    <input type="hidden" id="editKey">
    <div class="input-group"><input type="text" id="mName" placeholder="Фильм номи"></div>
    <div class="input-group"><textarea id="mEmbed" rows="4" placeholder="<iframe> кодни жойланг"></textarea></div>
    <div class="input-group">
        <select id="mGenre">
            <option value="Боевик">Боевик</option>
            <option value="Детектив">Детектив</option>
            <option value="Триллер">Триллер</option>
            <option value="Мелодрама">Мелодрама</option>
            <option value="Комедия">Комедия</option>
            <option value="Қўрқинчли">Қўрқинчли</option>
            <option value="Ретро">Ретро</option>
            <option value="Фантастика">Фантастика</option>
            <option value="Болалар учун фильм">Болалар учун фильм</option>
            <option value="Ўзбек ретро">ўзбек ретро</option>
            <option value="Ўзбек фильм">Ўзбек фильм</option>
        </select>
    </div>
    <button class="btn btn-gold" style="width: 100%;" onclick="saveToFirebase()">Серверга сақлаш</button>
    <button class="btn btn-outline" style="width: 100%; margin-top: 10px;" onclick="closeAdmin()">Ёпиш</button>
</div>

<div class="container">
    <div class="movie-grid" id="movieGrid"></div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--gold-solid);">Админ Кириш</h2>
        <input type="password" id="passInput" style="width:100%; padding:12px; margin:20px 0; background:#000; color:white; border:1px solid var(--gold-solid); border-radius:8px; text-align:center; font-size:20px;" placeholder="****" maxlength="4">
        <button class="btn btn-gold" style="width:100%;" onclick="checkAuth()">Кириш</button>
        <button class="btn" style="color: #64748b; margin-top:10px; background:none;" onclick="closeLogin()">Бекор қилиш</button>
    </div>
</div>

<script>
    // ЯНГИ БАЗА (universal-media-8f205) МАЪЛУМОТЛАРИ
    const firebaseConfig = {
        apiKey: "AIzaSyAV9u_Go4bIuDlC-vM3rH1T9MwLGwe9H3I",
        authDomain: "universal-media-8f205.firebaseapp.com",
        databaseURL: "https://universal-media-8f205-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-media-8f205",
        storageBucket: "universal-media-8f205.firebasestorage.app",
        messagingSenderId: "21945142340",
        appId: "1:21945142340:web:796e1d4e85566899b3c011"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let isAdmin = localStorage.getItem('isMovieAdmin') === 'true';

    if(isAdmin) {
        document.getElementById('navBtns').innerHTML = '<button class="btn btn-danger" onclick="logout()">Чиқиш</button>';
        document.getElementById('adminPanel').style.display = 'block';
    }

    // МАНА ШУ ЕРДА 'movies' ПАПКАСИДАН ЎҚИЙДИ (ЯНГИ БАЗА УЧУН)
    database.ref('movies').on('value', (snapshot) => {
        const movies = snapshot.val() || {};
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';

        Object.keys(movies).reverse().forEach(key => {
            const m = movies[key];
            if(!m.embed) return;

            const views = m.views || 0;
            const likes = m.likes || 0;
            const rating = m.rating || 0;

            let starsHtml = '';
            for(let i=1; i<=5; i++) {
                starsHtml += `<span class="star-btn ${i <= Math.round(rating) ? 'active' : ''}" onclick="rateMovie('${key}', ${i})">★</span>`;
            }

            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <div class="video-container" onclick="addInfo('${key}', 'views')">${m.embed}</div>
                <div class="movie-info">
                    <h3>${m.name}</h3>
                    <div class="stars">${starsHtml}</div>
                    <p style="color:#64748b; font-size:12px;">#${m.genre}</p>
                </div>
                <div class="stats">
                    <div class="stats-item">👁 ${views}</div>
                    <div class="stats-item" onclick="addInfo('${key}', 'likes')">❤️ ${likes}</div>
                    <div class="stats-item">⭐ ${rating.toFixed(1)}</div>
                </div>
                ${isAdmin ? `
                    <div class="admin-btns">
                        <button class="btn btn-outline" style="padding:5px 10px; font-size:12px;" onclick="prepareEdit('${key}')">Таҳрир</button>
                        <button class="btn btn-danger" style="padding:5px 10px; font-size:12px;" onclick="deleteMovie('${key}')">Ўчириш</button>
                    </div>
                ` : ''}
            `;
            grid.appendChild(card);
        });
    });

    function saveToFirebase() {
        const name = document.getElementById('mName').value;
        const embed = document.getElementById('mEmbed').value;
        const genre = document.getElementById('mGenre').value;
        const key = document.getElementById('editKey').value;

        if(name && embed) {
            if(key) {
                database.ref('movies/' + key).update({ name, embed, genre });
                alert("Янгиланди!");
            } else {
                database.ref('movies').push({ 
                    name, embed, genre, views: 0, likes: 0, rating: 0, ratingSum: 0, ratingCount: 0 
                });
                alert("Сақланди!");
            }
            resetForm();
        }
    }

    function addInfo(key, type) {
        database.ref(`movies/${key}/${type}`).transaction(c => (c || 0) + 1);
    }

    function rateMovie(key, stars) {
        database.ref(`movies/${key}`).transaction(m => {
            if (m) {
                if (!m.ratingCount) m.ratingCount = 0;
                if (!m.ratingSum) m.ratingSum = 0;
                m.ratingCount++;
                m.ratingSum += stars;
                m.rating = m.ratingSum / m.ratingCount;
            }
            return m;
        });
    }

    function prepareEdit(key) {
        database.ref('movies/' + key).once('value').then(s => {
            const m = s.val();
            document.getElementById('mName').value = m.name;
            document.getElementById('mEmbed').value = m.embed;
            document.getElementById('mGenre').value = m.genre;
            document.getElementById('editKey').value = key;
            document.getElementById('formTitle').innerText = "Таҳрирлаш";
            document.getElementById('adminPanel').style.display = 'block';
            window.scrollTo(0,0);
        });
    }

    function deleteMovie(key) {
        if(confirm("Ўчирилсинми?")) database.ref('movies/' + key).remove();
    }

    function checkAuth() {
        if(document.getElementById('passInput').value === "1975") {
            localStorage.setItem('isMovieAdmin', 'true');
            location.reload();
        } else { alert("Хато!"); }
    }

    function resetForm() {
        document.getElementById('mName').value = "";
        document.getElementById('mEmbed').value = "";
        document.getElementById('editKey').value = "";
        document.getElementById('formTitle').innerText = "Фильм қўшиш";
        document.getElementById('adminPanel').style.display = 'none';
    }

    function openLogin() { 
        if(isAdmin) {
            let p = document.getElementById('adminPanel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        } else { document.getElementById('loginModal').style.display = 'flex'; }
    }
    function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }
    function closeAdmin() { resetForm(); }
    function logout() { localStorage.removeItem('isMovieAdmin'); location.reload(); }
</script>
</body>
</html>
